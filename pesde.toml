name = "ewdev/luau_package_template"
version = "0.1.0"
description = "A project template for Luau packages"
authors = ["EwDev (https://ewdev.net/)"]
repository = "https://github.com/ewd3v/luau_package_template"
license = "MIT"

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

# Any dependency here also needs to be defined in the scripts/scaffold.luau script

[dev_dependencies]
lute_std_lint = { name = "ewdev/lute_std_lint", version = "^0.1.0", target = "luau" }
